<svg viewBox="0 0 1000 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Inter, Arial, sans-serif" role="img" aria-labelledby="ht hd">
  <title id="ht">How FLOWITS works</title>
  <desc id="hd">A five-step journey: an officer reports an incident, FLOWITS predicts severity and duration, plans deployment, plans diversion, and congestion is eased.</desc>
  <rect x="0" y="0" width="1000" height="380" fill="#ffffff"/>
  <defs>
    <marker id="h" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ea580c"/></marker>
  </defs>

  <!-- frame -->
  <rect x="30" y="92" width="940" height="252" rx="18" fill="#fffaf7" stroke="#ea580c" stroke-width="2"/>
  <text x="500" y="124" text-anchor="middle" fill="#ea580c" font-size="14" font-weight="700" letter-spacing="0.16em">FLOWITS TAKES OVER</text>
  <line x1="430" y1="134" x2="570" y2="134" stroke="#f0a878" stroke-width="1.4"/>

  <!-- connector line behind circles -->
  <line x1="160" y1="238" x2="840" y2="238" stroke="#e6e4de" stroke-width="2"/>
  <line x1="232" y1="238" x2="288" y2="238" stroke="#ea580c" stroke-width="2" marker-end="url(#h)"/>
  <line x1="412" y1="238" x2="468" y2="238" stroke="#ea580c" stroke-width="2" marker-end="url(#h)"/>
  <line x1="592" y1="238" x2="648" y2="238" stroke="#ea580c" stroke-width="2" marker-end="url(#h)"/>
  <line x1="772" y1="238" x2="828" y2="238" stroke="#ea580c" stroke-width="2" marker-end="url(#h)"/>

  <!-- ===== Circle 1: Report (label above) ===== -->
  <circle cx="160" cy="238" r="50" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <g stroke="#1a1a1a" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="160" cy="226" r="9" fill="#fff1e9"/>
    <path d="M144 256 a16 14 0 0 1 32 0"/>
  </g>
  <circle cx="160" cy="186" r="4" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <line x1="160" y1="182" x2="160" y2="172" stroke="#ea580c" stroke-width="1.6"/>
  <text x="160" y="166" text-anchor="middle" fill="#1a1a1a" font-size="13.5" font-weight="700">Report incident</text>

  <!-- ===== Circle 2: Predict (label below) ===== -->
  <circle cx="340" cy="238" r="50" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <g stroke-linecap="round">
    <line x1="322" y1="256" x2="322" y2="244" stroke="#1a1a1a" stroke-width="5"/>
    <line x1="334" y1="256" x2="334" y2="234" stroke="#1a1a1a" stroke-width="5"/>
    <line x1="346" y1="256" x2="346" y2="224" stroke="#f0a878" stroke-width="5"/>
    <line x1="358" y1="256" x2="358" y2="214" stroke="#ea580c" stroke-width="5"/>
  </g>
  <circle cx="340" cy="290" r="4" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <line x1="340" y1="294" x2="340" y2="304" stroke="#ea580c" stroke-width="1.6"/>
  <text x="340" y="322" text-anchor="middle" fill="#1a1a1a" font-size="13.5" font-weight="700">Predict severity and duration</text>

  <!-- ===== Circle 3: Deployment (label above) ===== -->
  <circle cx="520" cy="238" r="50" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <g stroke="#1a1a1a" stroke-width="2.2" fill="none" stroke-linecap="round">
    <line x1="498" y1="226" x2="542" y2="226"/>
    <line x1="498" y1="236" x2="542" y2="236"/>
    <line x1="506" y1="226" x2="506" y2="252"/>
    <line x1="534" y1="226" x2="534" y2="252"/>
    <line x1="504" y1="226" x2="514" y2="236"/>
    <line x1="522" y1="226" x2="532" y2="236"/>
  </g>
  <circle cx="520" cy="186" r="4" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <line x1="520" y1="182" x2="520" y2="172" stroke="#ea580c" stroke-width="1.6"/>
  <text x="520" y="166" text-anchor="middle" fill="#1a1a1a" font-size="13.5" font-weight="700">Plan deployment</text>

  <!-- ===== Circle 4: Diversion (label below) ===== -->
  <circle cx="700" cy="238" r="50" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <g stroke="#ea580c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M692 258 L692 236 Q692 224 704 224 L716 224"/>
    <path d="M708 216 L720 224 L708 232"/>
  </g>
  <circle cx="700" cy="290" r="4" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <line x1="700" y1="294" x2="700" y2="304" stroke="#ea580c" stroke-width="1.6"/>
  <text x="700" y="322" text-anchor="middle" fill="#1a1a1a" font-size="13.5" font-weight="700">Plan diversion</text>

  <!-- ===== Circle 5: Eased (label above) ===== -->
  <circle cx="880" cy="238" r="50" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="880" cy="238" r="22" fill="#eaf5ee" stroke="#15803d" stroke-width="2"/>
  <path d="M869 238 l8 8 l14 -16" fill="none" stroke="#15803d" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="880" cy="186" r="4" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
  <line x1="880" y1="182" x2="880" y2="172" stroke="#ea580c" stroke-width="1.6"/>
  <text x="880" y="166" text-anchor="middle" fill="#1a1a1a" font-size="13.5" font-weight="700">Congestion eased</text>
</svg>
